name: Chatbot Evals
on:
  # DISABLED: re-enable when ready to consume API credits on every push
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Wait for Vercel deploy
        run: sleep 90
      - name: Run evals
        env:
          CHAT_API_URL: https://santifer.io/api/chat
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run evals
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eval-report-${{ github.sha }}
          path: evals/results/
